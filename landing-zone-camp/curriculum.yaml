      - { code: c2-08, title: 从验收条件生成测试用例,      module: M8, domain: 7,  verify: ci, minutes: 35, unlocks: [c2-02], repo_path: labs/c2-08-ac-to-tests }
      - { code: c2-09, title: Bugfix 三层描述法实战,       module: M8, domain: 7,  verify: ci, minutes: 40, unlocks: [c2-08], repo_path: labs/c2-09-bugfix-three-layer }
      - { code: c2-10, title: 安全基线：漏洞依赖与不安全用法修复, module: M9, domain: 8, verify: ci, minutes: 30, unlocks: [c1-09], repo_path: labs/c2-10-security-baseline }

