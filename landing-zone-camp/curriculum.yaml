    name: AI 协作开发者（白带）
    graduation: { labs: all_yellow, micro_project: true, tool_registered: true }
    labs:
      - { code: c1-00, title: "hello, camp：环境准备与第一次提交", module: M1, domain: 1, verify: ci, minutes: 15, unlocks: [], repo_path: labs/c1-00-hello-camp }
      - { code: c1-01, title: 部门默认工具安装与配置校验, module: M1, domain: 1,  verify: ci, minutes: 20, unlocks: [c1-00], repo_path: labs/c1-01-env-setup }
      - { code: c1-02, title: Rules 与 Skill 加载验证,     module: M1, domain: 2,  verify: ci, minutes: 20, unlocks: [c1-01], repo_path: labs/c1-02-rules-loading }
      - { code: c1-03, title: 给项目写 AGENTS.md,          module: M2, domain: 2,  verify: ci, minutes: 30, unlocks: [c1-02], repo_path: labs/c1-03-agents-md }
      - { code: c1-04, title: context-map 匹配实验,        module: M2, domain: 2,  verify: ci, minutes: 25, unlocks: [c1-02], repo_path: labs/c1-04-context-map }
      - { code: c1-05, title: L0/L1 分级判断 10 题,        module: M3, domain: 3,  verify: ci, minutes: 15, unlocks: [c1-02], repo_path: labs/c1-05-spec-level-quiz }
      - { code: c1-06, title: 用 EARS 写 Quick Spec,       module: M3, domain: 3,  verify: hybrid, minutes: 25, unlocks: [c1-05], repo_path: labs/c1-06-ears-quick-spec }
      - { code: c1-07, title: 从 Quick Spec 生成代码并跑通测试, module: M4, domain: 5, verify: ci, minutes: 30, unlocks: [c1-06], repo_path: labs/c1-07-spec-to-code }
      - { code: c1-08, title: 幻觉初识：找出埋下的 2 处幻觉, module: M4, domain: 9,  verify: ci, minutes: 25, unlocks: [c1-07], repo_path: labs/c1-08-hallucination-hunt }
