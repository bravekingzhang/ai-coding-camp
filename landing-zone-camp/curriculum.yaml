      - { code: c3-02, title: 你的第一个 Skill（互测定绿）, module: M10, domain: 10, verify: hybrid, green_by: peer_test, minutes: 45, unlocks: [c3-01], repo_path: labs/c3-02-first-skill }
      - { code: c3-03, title: SkillHub 全流程走通,          module: M11, domain: 11, verify: manual, minutes: 30, unlocks: [c3-02], repo_path: labs/c3-03-skillhub-flow }
      - { code: c3-04, title: 资产淘汰演习（10 个去留判定）, module: M11, domain: 11, verify: ci, minutes: 30, unlocks: [c3-03], repo_path: labs/c3-04-asset-retirement }
      - { code: c3-05, title: MCP 接入企业文档并可溯源引用,  module: M12, domain: 12, verify: ci, minutes: 35, unlocks: [c1-04], repo_path: labs/c3-05-mcp-company-docs }
      - { code: c3-06, title: MCP 权限与工具白名单配置,     module: M12, domain: 12, verify: ci, minutes: 20, unlocks: [c3-05], repo_path: labs/c3-06-mcp-policy }
      - { code: c3-07, title: RepoWiki：为遗留系统构建上下文, module: M13, domain: 12, verify: ci, minutes: 40, unlocks: [c2-06], repo_path: labs/c3-07-repowiki }
      - { code: c3-08, title: 遗留代码：先补测试再重构,     module: M13, domain: 7,  verify: ci, minutes: 45, unlocks: [c3-07], repo_path: labs/c3-08-legacy-tests-refactor }
      - { code: c3-09, title: 四阶段工作流完整走一遍, module: M14, domain: 5,  verify: ci, minutes: 45, unlocks: [c2-09], repo_path: labs/c3-09-superpowers-e2e }
      - { code: c3-10, title: 需求单到发布单全链路演练,     module: M14, domain: 13, verify: ci, minutes: 45, unlocks: [c3-09], repo_path: labs/c3-10-full-sdlc }

  - code: C4
    name: 工程教练（黑带）
    graduation: { project: { code: P3, min: YELLOW }, baseline_report: true }
