      - { code: c2-02, title: 写一份 L2 标准 Spec,         module: M5, domain: 3,  verify: hybrid, minutes: 45, unlocks: [c2-01], repo_path: labs/c2-02-write-l2-spec }
      - { code: c2-03, title: 「禁止越级」陷阱题,          module: M5, domain: 3,  verify: ci, minutes: 20, unlocks: [c2-02], repo_path: labs/c2-03-refactor-trap }
      - { code: c2-04, title: 给坏 Spec 挑刺（8 处缺陷）,  module: M6, domain: 4,  verify: hybrid, minutes: 30, unlocks: [c2-02], repo_path: labs/c2-04-bad-spec-review }
      - { code: c2-05, title: Review Checklist 跨组互评,   module: M6, domain: 4,  verify: peer, minutes: 40, unlocks: [c2-04], repo_path: labs/c2-05-peer-spec-review }
      - { code: c2-06, title: 四维审查实战（安全/正确/性能/可维护）, module: M7, domain: 6, verify: ci, minutes: 40, unlocks: [c1-10], repo_path: labs/c2-06-four-dim-review }
